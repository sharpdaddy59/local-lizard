name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: LocalLizard.Web
            artifact: web-ui
          - name: LocalLizard.Telegram
            artifact: telegram-bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish ${{ matrix.project.name }} (linux-x64)
        run: |
          dotnet publish src/${{ matrix.project.name }} \
            -c Release \
            -r linux-x64 \
            --self-contained \
            -o publish/${{ matrix.project.name }}

      - name: Create archive
        run: |
          cd publish
          tar czf ../${{ matrix.project.artifact }}-linux-x64.tar.gz ${{ matrix.project.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.artifact }}
          path: ${{ matrix.project.artifact }}-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        project:
          - name: LocalLizard.Web
            artifact: web-ui
          - name: LocalLizard.Telegram
            artifact: telegram-bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish ${{ matrix.project.name }} (win-x64)
        run: |
          dotnet publish src/${{ matrix.project.name }} `
            -c Release `
            -r win-x64 `
            --self-contained `
            -o publish/${{ matrix.project.name }}
        shell: pwsh

      - name: Create archive
        run: |
          cd publish
          Compress-Archive -Path ${{ matrix.project.name }} -DestinationPath ../${{ matrix.project.artifact }}-win-x64.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.artifact }}-windows
          path: ${{ matrix.project.artifact }}-win-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: LocalLizard ${{ github.ref_name }}
          body: |
            Automated self-contained builds for Linux x64 + Windows x64.

            **Downloads:**
            - Linux: `*-linux-x64.tar.gz` (extract and run)
            - Windows: `*-win-x64.zip` (extract and run)

            **Usage (Linux):**
            ```bash
            tar xzf web-ui-linux-x64.tar.gz
            cd LocalLizard.Web
            ./LocalLizard.Web --urls "http://0.0.0.0:5000"
            ```

            **Usage (Windows):**
            ```powershell
            Expand-Archive web-ui-win-x64.zip
            cd LocalLizard.Web
            .\LocalLizard.Web.exe --urls "http://localhost:5000"
            ```

            **Requirements:**
            - Linux x86_64 or Windows x64
            - ffmpeg (for voice pipeline)
            - Piper TTS binary + voice model
            - Whisper ggml-base.bin
            - Gemma 3 1B GGUF model
          files: |
            artifacts/*/*.tar.gz
            artifacts/*/*.zip
