<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LocalLizard 🦎</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --surface: #16213e;
            --surface2: #0f3460;
            --accent: #00d2ff;
            --accent2: #7b2ff7;
            --text: #e0e0e0;
            --text-dim: #888;
            --danger: #ff4757;
            --success: #2ed573;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: var(--surface);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--surface2);
        }
        header h1 { font-size: 1.2rem; font-weight: 600; }
        header .emoji { font-size: 1.5rem; }
        #status {
            margin-left: auto;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: var(--surface2);
        }
        #status.connected { background: #1a4a2e; color: var(--success); }
        #status.error { background: #4a1a1a; color: var(--danger); }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: var(--surface2);
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            align-self: flex-start;
            background: var(--surface);
            border: 1px solid var(--surface2);
            border-bottom-left-radius: 4px;
        }
        .msg.system {
            align-self: center;
            background: transparent;
            color: var(--text-dim);
            font-size: 0.85rem;
            padding: 4px;
        }
        .msg .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .msg .audio-player {
            margin-top: 8px;
            width: 100%;
            max-width: 300px;
        }
        #input-area {
            background: var(--surface);
            padding: 12px 20px;
            border-top: 1px solid var(--surface2);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        #msg-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--surface2);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-size: 0.95rem;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            outline: none;
        }
        #msg-input:focus { border-color: var(--accent); }
        #msg-input::placeholder { color: var(--text-dim); }
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #send-btn {
            background: var(--accent);
            color: var(--bg);
        }
        #voice-btn {
            background: var(--surface2);
            color: var(--text);
            min-width: 44px;
            position: relative;
        }
        #voice-btn.recording {
            background: var(--danger);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .typing::after {
            content: '▊';
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        #voice-status {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
            padding: 2px;
        }
    </style>
</head>
<body>
    <header>
        <span class="emoji">🦎</span>
        <h1>LocalLizard</h1>
        <span id="status">connecting...</span>
    </header>
    <div id="chat"></div>
    <div id="input-area">
        <button id="voice-btn" title="Hold to record (or click to toggle)">🎤</button>
        <textarea id="msg-input" rows="1" placeholder="Type a message..."></textarea>
        <button id="send-btn">Send</button>
    </div>
    <div id="voice-status"></div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('msg-input');
        const sendBtn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const statusEl = document.getElementById('status');
        const voiceStatus = document.getElementById('voice-status');

        let busy = false;
        let currentAssistantEl = null;
        let mediaRecorder = null;
        let audioChunks = [];

        // Auto-resize textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        });

        // Enter to send (shift+enter for newline)
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        // Voice recording
        let isRecording = false;

        voiceBtn.addEventListener('click', toggleRecording);

        async function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {
                    stream.getTracks().forEach(t => t.stop());
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    await sendVoice(blob);
                };

                mediaRecorder.start();
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceStatus.textContent = 'Recording... click to stop';
            } catch (err) {
                voiceStatus.textContent = 'Microphone not available';
                console.error('Mic error:', err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            voiceBtn.classList.remove('recording');
            voiceStatus.textContent = 'Processing...';
        }

        async function sendVoice(blob) {
            if (busy) return;
            busy = true;
            sendBtn.disabled = true;

            const formData = new FormData();
            formData.append('audio', blob, 'recording.webm');

            addMessage('user', '🎤 [voice message]');

            try {
                voiceStatus.textContent = 'Transcribing...';
                const resp = await fetch('/api/transcribe-upload', { method: 'POST', body: formData });
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                const text = data.text || '(empty)';

                // Replace the voice message with transcription
                const lastUser = chat.querySelector('.msg.user:last-child');
                if (lastUser) lastUser.textContent = '🎤 ' + text;

                voiceStatus.textContent = '';
                // Now send the transcribed text through chat
                await streamChat(text);
            } catch (err) {
                addMessage('system', 'Voice error: ' + err.message);
                voiceStatus.textContent = '';
            } finally {
                busy = false;
                sendBtn.disabled = false;
            }
        }

        function addMessage(role, text) {
            const el = document.createElement('div');
            el.className = `msg ${role}`;
            el.textContent = text;
            chat.appendChild(el);
            chat.scrollTop = chat.scrollHeight;
            return el;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text || busy) return;

            input.value = '';
            input.style.height = 'auto';
            addMessage('user', text);
            await streamChat(text);
        }

        async function streamChat(text) {
            busy = true;
            sendBtn.disabled = true;

            const el = document.createElement('div');
            el.className = 'msg assistant typing';
            chat.appendChild(el);
            chat.scrollTop = chat.scrollHeight;
            currentAssistantEl = el;

            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!resp.ok) throw new Error(await resp.text());

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    el.textContent = fullText;
                    chat.scrollTop = chat.scrollHeight;
                }

                el.classList.remove('typing');
                el.textContent = fullText || '(empty response)';

                // Auto-synthesize voice response
                synthesizeVoice(fullText);

            } catch (err) {
                el.classList.remove('typing');
                el.textContent = 'Error: ' + err.message;
            } finally {
                busy = false;
                sendBtn.disabled = false;
                currentAssistantEl = null;
            }
        }

        async function synthesizeVoice(text) {
            if (!text || text.startsWith('Error')) return;
            try {
                const resp = await fetch('/api/synthesize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                if (!resp.ok) return;
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const audio = new Audio(url);
                audio.play();

                // Add small audio player to message
                if (currentAssistantEl) {
                    const player = document.createElement('audio');
                    player.controls = true;
                    player.src = url;
                    player.className = 'audio-player';
                    currentAssistantEl.appendChild(player);
                }
            } catch (err) {
                console.error('TTS error:', err);
            }
        }

        // Check health
        fetch('/health').then(r => {
            statusEl.textContent = r.ok ? 'connected' : 'error';
            statusEl.className = r.ok ? 'connected' : 'error';
        }).catch(() => {
            statusEl.textContent = 'offline';
            statusEl.className = 'error';
        });

        input.focus();
    </script>
</body>
</html>
